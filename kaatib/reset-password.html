<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كاتب — إعادة تعيين كلمة المرور</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0F0F17;
      color: #E0E0E0;
      font-family: -apple-system, 'SF Pro Arabic', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1A1A2E;
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      background: rgba(212, 175, 55, 0.1);
      border: 2px solid rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #D4AF37;
      stroke-width: 2;
      fill: none;
    }

    .icon-success {
      background: rgba(1, 50, 32, 0.3);
      border-color: #013220;
    }

    .icon-success svg {
      stroke: #4CAF50;
      stroke-width: 3;
    }

    .icon-error {
      background: rgba(200, 50, 50, 0.1);
      border-color: rgba(200, 50, 50, 0.3);
    }

    .icon-error svg {
      stroke: #E57373;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #A0A0B0;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: right;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #A0A0B0;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: #0F0F17;
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      color: #E0E0E0;
      font-size: 16px;
      outline: none;
      direction: ltr;
      text-align: left;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #D4AF37;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #D4AF37, #B8960C);
      color: #0F0F17;
      font-size: 17px;
      font-weight: 700;
      padding: 14px 40px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-link {
      display: inline-block;
      background: linear-gradient(135deg, #D4AF37, #B8960C);
      color: #0F0F17;
      font-size: 17px;
      font-weight: 700;
      padding: 14px 40px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn-link:hover { opacity: 0.85; }

    .error-msg {
      color: #E57373;
      font-size: 13px;
      margin-top: 6px;
      min-height: 18px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(15, 15, 23, 0.3);
      border-top-color: #0F0F17;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden { display: none; }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #555;
    }

    .footer a {
      color: #777;
      text-decoration: none;
      margin: 0 8px;
    }

    .footer a:hover { color: #D4AF37; }

    .sep { color: #444; }
  </style>
</head>
<body>

  <!-- حالة النموذج: إدخال كلمة المرور الجديدة -->
  <div class="card" id="form-view">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>إعادة تعيين كلمة المرور</h1>
    <p>أدخل كلمة مرورك الجديدة لحساب كاتب</p>

    <form id="reset-form" onsubmit="return false;">
      <div class="form-group">
        <label for="password">كلمة المرور الجديدة</label>
        <input type="password" id="password" placeholder="٨ أحرف على الأقل" minlength="8" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm-password">تأكيد كلمة المرور</label>
        <input type="password" id="confirm-password" placeholder="أعد كتابة كلمة المرور" minlength="8" required autocomplete="new-password">
      </div>
      <div class="error-msg" id="error-msg"></div>
      <button type="submit" class="btn" id="submit-btn">تحديث كلمة المرور</button>
    </form>
  </div>

  <!-- حالة النجاح -->
  <div class="card hidden" id="success-view">
    <div class="icon icon-success">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>تم تحديث كلمة المرور!</h1>
    <p>ارجع إلى تطبيق كاتب وسجّل دخولك بكلمة المرور الجديدة.</p>
    <a class="btn-link" href="https://apps.apple.com/app/id6763545972">افتح كاتب</a>
  </div>

  <!-- حالة الخطأ: رابط غير صالح -->
  <div class="card hidden" id="error-view">
    <div class="icon icon-error">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <h1>رابط غير صالح</h1>
    <p id="error-view-msg">هذا الرابط منتهي الصلاحية أو غير صحيح. اطلب رابط استعادة جديد من التطبيق.</p>
    <a class="btn-link" href="https://apps.apple.com/app/id6763545972">افتح كاتب</a>
  </div>

  <div class="footer">
    <a href="privacy-policy.html">سياسة الخصوصية</a>
    <span class="sep">|</span>
    <a href="terms-of-service.html">الشروط والأحكام</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://oefjknffvgcfijbancox.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Fc9-NgA7kUNBu309cMG_nQ_5pOuu4Y5';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const formView = document.getElementById('form-view');
    const successView = document.getElementById('success-view');
    const errorView = document.getElementById('error-view');
    const errorViewMsg = document.getElementById('error-view-msg');
    const resetForm = document.getElementById('reset-form');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    function showView(view) {
      formView.classList.add('hidden');
      successView.classList.add('hidden');
      errorView.classList.add('hidden');
      view.classList.remove('hidden');
    }

    // انتظر جلسة Supabase من الـ hash
    async function init() {
      // Supabase v2 يعالج الـ hash تلقائياً عبر onAuthStateChange
      const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(
        async (event, session) => {
          if (event === 'PASSWORD_RECOVERY') {
            // التوكن صالح — نعرض النموذج
            showView(formView);
          } else if (event === 'SIGNED_IN' && !session) {
            showView(errorView);
          }
        }
      );

      // تحقق: هل يوجد hash فيه توكن؟
      const hash = window.location.hash;
      if (!hash || !hash.includes('type=recovery')) {
        // لا يوجد توكن استعادة — ربما رابط خاطئ
        // ننتظر قليلاً لأن onAuthStateChange قد يُطلق
        setTimeout(() => {
          // إذا لم يتغير العرض بعد، نعرض خطأ
          if (!formView.classList.contains('hidden')) return; // النموذج ظاهر بالفعل
          if (!successView.classList.contains('hidden')) return;
          if (!errorView.classList.contains('hidden')) return;
          showView(errorView);
        }, 2000);
      }
    }

    resetForm.addEventListener('submit', async () => {
      const password = passwordInput.value;
      const confirm = confirmInput.value;

      errorMsg.textContent = '';

      if (password.length < 8) {
        errorMsg.textContent = 'كلمة المرور يجب أن تكون ٨ أحرف على الأقل';
        return;
      }

      if (password !== confirm) {
        errorMsg.textContent = 'كلمتا المرور غير متطابقتين';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';

      try {
        const { error } = await supabaseClient.auth.updateUser({ password });

        if (error) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'تحديث كلمة المرور';

          if (error.message.includes('expired') || error.message.includes('invalid')) {
            showView(errorView);
          } else {
            errorMsg.textContent = error.message || 'حدث خطأ — حاول مرة أخرى';
          }
          return;
        }

        showView(successView);
      } catch (e) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'تحديث كلمة المرور';
        errorMsg.textContent = 'حدث خطأ في الاتصال — حاول مرة أخرى';
      }
    });

    init();
  </script>

</body>
</html>
